<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(titulo, contenido)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${titulo}">El Bucle Infinito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --color-primario: #7B1D2E;
            --color-secundario: #F5F0E8;
            --color-acento: #C9A84C;
            --color-texto: #2C2C2C;
            --color-vip: #5C7A3E;
        }
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--color-secundario);
            color: var(--color-texto);
        }
        h1, h2, h3, h4, h5 {
            font-family: 'Playfair Display', serif;
        }
        .navbar {
            background-color: var(--color-primario) !important;
            border-bottom: 3px solid var(--color-acento);
        }
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--color-secundario) !important;
            letter-spacing: 0.05em;
        }
        .navbar-brand .infinito {
            color: var(--color-acento);
            font-size: 1.6rem;
        }
        .nav-link {
            color: rgba(245,240,232,0.85) !important;
        }
        .nav-link:hover {
            color: var(--color-acento) !important;
        }
        .btn-primario {
            background-color: var(--color-primario);
            color: var(--color-secundario);
            border: none;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .btn-primario:hover {
            background-color: #5e1522;
            color: var(--color-acento);
        }
        .btn-acento {
            background-color: var(--color-acento);
            color: #1a1a1a;
            border: none;
            font-weight: 700;
        }
        .btn-acento:hover {
            background-color: #a8872e;
            color: #fff;
        }
        .badge-vip {
            background-color: var(--color-vip);
            color: #fff;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 12px;
            vertical-align: middle;
        }
        .estado-CONFIRMADA  { background-color: #d4edda; color: #155724; }
        .estado-PENDIENTE   { background-color: #fff3cd; color: #856404; }
        .estado-CANCELADA   { background-color: #f8d7da; color: #721c24; }
        .estado-pill {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .card-mesa {
            border-top: 4px solid var(--color-acento);
            border-radius: 8px;
        }
        .card-mesa.inactiva {
            opacity: 0.5;
            filter: grayscale(0.8);
        }
        footer {
            background-color: var(--color-primario);
            color: var(--color-secundario);
            border-top: 3px solid var(--color-acento);
        }
        footer a {
            color: var(--color-acento);
        }
        .separador {
            border-top: 2px solid var(--color-acento);
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
                <img th:src="@{/images/logo.png}" alt="El Bucle Infinito" style="height:38px;">
                El Bucle Infinito
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/clientes}">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/mesas}">Mesas</a></li>
                    <li class="nav-item ms-2">
                        <a class="btn btn-acento btn-sm px-3" th:href="@{/clientes/new}">+ Nueva Reserva</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main th:replace="${contenido}">
        <!-- contenido dinámico -->
    </main>

    <footer class="mt-5 py-4 text-center small">
        <div class="container">
            <p class="mb-1"><img th:src="@{/images/logo.png}" alt="El Bucle Infinito" style="height:60px;"></p>
            <p class="mb-0 text-white-50">Restaurante italiano · San Sebastián · Montevideo</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
