<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>El Bucle Infinito · Clientes</title>
</head>
<body>
<main>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Clientes</h2>
            <a th:href="@{/clientes/new}" class="btn btn-primario">+ Nuevo Cliente</a>
        </div>

        <!-- Buscador -->
        <form th:action="@{/clientes}" method="get" class="row g-2 mb-4">
            <div class="col-md-6">
                <input type="text" class="form-control" name="apellido" placeholder="Buscar por apellido..."
                       th:value="${param.apellido}"/>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primario w-100">Buscar</button>
            </div>
            <div class="col-md-2">
                <a th:href="@{/clientes}" class="btn btn-outline-secondary w-100">Ver todos</a>
            </div>
        </form>

        <div th:if="${clientes.empty}" class="alert alert-warning">
            No se encontraron clientes.
        </div>

        <div th:unless="${clientes.empty}">
            <div class="table-responsive">
                <table class="table table-hover align-middle" style="background:#fff; border-radius:8px; overflow:hidden;">
                    <thead style="background:#7B1D2E; color:#F5F0E8;">
                        <tr>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Teléfono</th>
                            <th>Ciudad</th>
                            <th>Reservas</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cliente : ${clientes}">
                            <td>
                                <th:block th:text="${cliente.nombre}"/>
                                <span th:if="${cliente.vip}" class="badge-vip ms-1">VIP ♦</span>
                            </td>
                            <td th:text="${cliente.apellido}"/>
                            <td th:text="${cliente.telefono}"/>
                            <td th:text="${cliente.ciudad}"/>
                            <td>
                                <span class="badge bg-secondary" th:text="${#lists.size(cliente.reservas)}"/>
                            </td>
                            <td>
                                <a th:href="@{/clientes/{id}(id=${cliente.id})}" class="btn btn-sm btn-primario">Ver</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
