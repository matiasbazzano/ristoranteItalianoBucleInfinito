<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>El Bucle Infinito · Cliente</title>
</head>
<body>
<main>
    <div class="container py-5" style="max-width:640px;">
        <h2 class="mb-4" th:text="${cliente.isNew() ? 'Nuevo Cliente' : 'Editar Cliente'}"/>

        <div class="card shadow-sm" style="border-top:4px solid #7B1D2E;">
            <div class="card-body p-4">
                <form th:object="${cliente}"
                      th:action="${cliente.isNew() ? '/clientes/new' : '/clientes/' + cliente.id + '/edit'}"
                      method="post">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{nombre}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Apellido</label>
                            <input type="text" class="form-control" th:field="*{apellido}"
                                   th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{apellido}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Teléfono</label>
                            <input type="text" class="form-control" th:field="*{telefono}"
                                   th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{telefono}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Ciudad</label>
                            <input type="text" class="form-control" th:field="*{ciudad}"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Dirección</label>
                            <input type="text" class="form-control" th:field="*{direccion}"/>
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch mt-1">
                                <input class="form-check-input" type="checkbox" th:field="*{vip}" role="switch"/>
                                <label class="form-check-label fw-bold">
                                    Tarjeta VIP <span class="badge-vip ms-1">VIP ♦</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <hr class="separador my-4"/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primario px-4">Guardar</button>
                        <a th:href="${cliente.isNew() ? '/clientes' : '/clientes/' + cliente.id}"
                           class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
