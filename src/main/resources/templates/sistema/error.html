<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>El Bucle Infinito · Error</title>
</head>
<body>
<main>
    <div class="container py-5 text-center" style="max-width:560px;">
        <div style="font-size:5rem; color:#7B1D2E; margin-bottom:1rem;">∞</div>
        <h2 class="mb-2">¡Bucle infinito detectado!</h2>
        <p class="text-muted mb-4">
            Algo salió mal. Nuestros desarrolladores están intentando salir del bucle.
        </p>
        <p class="text-danger small" th:text="${message}"/>
        <a th:href="@{/}" class="btn btn-primario mt-3">Volver al inicio</a>
    </div>
</main>
</body>
</html>
